name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt huggingface_hub

      - name: Generate demo artifacts
        run: python generate_demo_data.py

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "HF_TOKEN or HF_SPACE_ID not set — skipping deploy."
            exit 0
          fi
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.upload_folder(
              folder_path='.',
              repo_id='$HF_SPACE_ID',
              repo_type='space',
              ignore_patterns=['.git/*', '.venv/*', 'venv311/*', 'node_modules/*'],
          )
          "
