# FlowCast AI — MySQL for local development / hackathon demo
# Usage: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: flowcast_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: flowcast123
      MYSQL_DATABASE: flowcast_ai
    ports:
      - "3306:3306"
    volumes:
      - flowcast_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pflowcast123"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  flowcast_mysql_data:
